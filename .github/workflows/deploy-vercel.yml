# Deploys to Vercel on every push to main (or master).
#
# Add these GitHub repository secrets: Settings → Secrets and variables → Actions
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       Project Settings → General, or run: vercel link && cat .vercel/project.json
#   VERCEL_PROJECT_ID   same as above
#
# Create the Vercel project once (Dashboard → Add New → Project) or: vercel link

name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
